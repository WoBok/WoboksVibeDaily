# =========================================================
# WoBok's Vibe Daily — 本地 nginx 测试配置（Windows）
# 用法：
#   nginx -c "E:/WebProrjects/WoBoksVibeDaily - CC/WoboksVibeDaily/nginx/wvd.local.conf"
#   停止：nginx -c "<同上>" -s stop
#   重载：nginx -c "<同上>" -s reload
#
# 说明：所有路径均为绝对路径，日志/PID/临时目录都落在项目 nginx/ 下，
#       不污染 nginx 安装目录。仅用于本地测试，生产配置见 devdocs/deployment.md。
# =========================================================

worker_processes  1;

pid      "E:/WebProrjects/WoBoksVibeDaily - CC/WoboksVibeDaily/nginx/run/nginx.pid";
error_log "E:/WebProrjects/WoBoksVibeDaily - CC/WoboksVibeDaily/nginx/logs/error.log" warn;

events {
    worker_connections  1024;
}

http {
    # 复用 nginx 安装目录自带的 mime.types
    include "C:/Users/WKC_F/AppData/Local/Microsoft/WinGet/Packages/nginxinc.nginx_Microsoft.Winget.Source_8wekyb3d8bbwe/nginx-1.31.2/conf/mime.types";
    default_type  application/octet-stream;

    # 临时目录落在项目内，避免与其它 nginx 实例冲突
    client_body_temp_path "E:/WebProrjects/WoBoksVibeDaily - CC/WoboksVibeDaily/nginx/temp/client_body";
    proxy_temp_path       "E:/WebProrjects/WoBoksVibeDaily - CC/WoboksVibeDaily/nginx/temp/proxy";
    fastcgi_temp_path     "E:/WebProrjects/WoBoksVibeDaily - CC/WoboksVibeDaily/nginx/temp/fastcgi";
    uwsgi_temp_path       "E:/WebProrjects/WoBoksVibeDaily - CC/WoboksVibeDaily/nginx/temp/uwsgi";
    scgi_temp_path        "E:/WebProrjects/WoBoksVibeDaily - CC/WoboksVibeDaily/nginx/temp/scgi";

    access_log "E:/WebProrjects/WoBoksVibeDaily - CC/WoboksVibeDaily/nginx/logs/access.log";

    sendfile      on;
    keepalive_timeout  65;

    server {
        listen       8080;
        server_name  localhost;

        # 静态前端根目录 = 项目根
        root  "E:/WebProrjects/WoBoksVibeDaily - CC/WoboksVibeDaily";
        index index.html;

        # /api/* 反向代理到 Node
        location /api/ {
            proxy_pass http://127.0.0.1:17321;
            proxy_http_version 1.1;
            proxy_set_header Host       $host;
            proxy_set_header X-Real-IP  $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # /content/posts/* 映射到 posts/ 静态文件
        location /content/posts/ {
            alias "E:/WebProrjects/WoBoksVibeDaily - CC/WoboksVibeDaily/posts/";
        }

        # 禁止外部直接访问 manifest
        location ~ _manifest\.json$ {
            return 404;
        }

        # SPA 兜底
        location / {
            try_files $uri $uri/ /index.html;
        }
    }
}
