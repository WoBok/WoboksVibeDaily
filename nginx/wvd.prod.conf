# =========================================================
# WoBok's Vibe Daily — 生产环境 nginx 配置模板（Linux）
# 部署位置：/etc/nginx/sites-available/woboks-vibe-daily
# 启用：    ln -s /etc/nginx/sites-available/woboks-vibe-daily /etc/nginx/sites-enabled/
# 测试：    sudo nginx -t
# 重载：    sudo nginx -s reload
#
# 部署前请替换：
#   example.com        → 你的域名
#   /var/www/woboks-vibe-daily → 项目实际部署路径
#   17321              → Node 服务端口（与 WVD_PORT 保持一致）
# =========================================================

# 如需 HTTPS，先用 certbot 自动改写本文件并签发证书：
#   sudo certbot --nginx -d example.com -d www.example.com

server {
    listen 80;
    listen [::]:80;
    server_name example.com www.example.com;

    # 静态前端根目录 = 项目根
    root /var/www/woboks-vibe-daily;
    index index.html;

    # 上传体积（文章以文本为主，留个余量）
    client_max_body_size 8m;

    # gzip 压缩静态资源
    gzip on;
    gzip_types text/plain text/css text/javascript application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    # /api/* 反向代理到 Node
    location /api/ {
        proxy_pass http://127.0.0.1:17321;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # /api 永不缓存
        proxy_hide_header Cache-Control;
        add_header Cache-Control "no-store" always;
    }

    # /content/posts/* 映射到 posts/ 静态文件（HTML 文章 iframe 用）
    location /content/posts/ {
        alias /var/www/woboks-vibe-daily/posts/;
        # 内容文件用 ETag / Last-Modified 协商缓存
        add_header Cache-Control "public, max-age=60";
    }

    # 禁止外部直接访问 manifest（防止泄露目录结构与文章清单）
    location ~ _manifest\.json$ {
        return 404;
    }

    # 前端静态资源：短缓存（无构建 hash，避免改版不生效）
    location = /index.html { add_header Cache-Control "no-cache"; }
    location ~ \.(js|css)$ { add_header Cache-Control "no-cache"; }

    # SPA 兜底
    location / {
        try_files $uri $uri/ /index.html;
    }
}
