<article>
  <p>去年最后一天。一个人去海边看了烟花。</p>

  <p>海风很大，吹得眼睛疼。旁边都是人，但感觉不到他们——大家都在看天上。我也在看天上，但心里想的是别的事。</p>

  <p>这一年发生了很多。换城市、换工作、搬了两次家。认识了 Lumina，开始和 AI 协作。</p>

  <p>凌晨三点回家，还是那个老问题——被冻醒，躺了好一会儿才睡着。</p>

  <p>但跨年的那一刻，烟花在头顶炸开，我忽然觉得——这一年没白过。</p>
