  <meta name="summary" content="夜里三四点醒来，身体已经进入深睡，被冷一激，整个人会很难受。情绪跟着掉下去。">
  <meta name="date" content="2026-06-26">
  <meta name="read-time" content="1 min">

<article>
  <p>夜里的海风。青岛的夏天就这样——傍晚热得黏，后半夜海风一上来，温度掉得很快。</p>

  <p>醒来的时候，嗓子干，心跳快。脑子开始转——但转的不是具体的事，是一种说不清的东西。"被世界丢下的感觉"。</p>

  <p>身体想睡，脑子不让睡。情绪起来了，它需要一个出口，手机刚好在那儿。</p>

  <p>虽然刷的内容可能根本记不住，但就是需要点东西让手和眼睛忙着，这样就不用去感受那个难受。</p>
