  <meta name="title" content="Qingdao Summer">
  <meta name="summary" content="李沧的夏天——下班路上那段路的树荫、海边吹过来的风、和广场上跳舞的人。">
  <meta name="date" content="2026-06-20">
  <meta name="read-time" content="2 min">
  <meta name="category" content="Fragments">
</head>
<body>
<article>
  <p>六月底的青岛，下午六点下班，太阳还没下去，但已经不那么晒了。地铁口的树荫挺密，走过去的那一段是凉的。</p>

  <p>路过一个广场，有人跳舞——不是广场舞那种，是一种我不认识的舞。几个人，动作很慢，像在水里。</p>

  <p>海边的风从地铁站的方向吹过来，带着一点点咸味。</p>

  <p>在青岛住了快一年，已经习惯这种夏天了。但有时候还是会被打动——走在路上忽然一阵风，整个人松下来。</p>
</article>
