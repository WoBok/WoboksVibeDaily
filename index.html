<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WoBok's Vibe Daily</title>
  <meta name="description" content="WoBok 的个人笔记——代码、数学、图形学与生活的札记。">

  <!-- Fonts: Fraunces (有机衬线大标题) + Newsreader (正衬线) + DM Mono (辅助) -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300;9..144,400;9..144,500;9..144,600&family=Newsreader:opsz,wght@6..72,300;6..72,400;6..72,500&family=DM+Mono:wght@400;500&display=swap"
    rel="stylesheet">

  <!-- Markdown 渲染：markdown-it + KaTeX + highlight.js + DOMPurify（前端渲染，见 refactor-design §9） -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@highlightjs/cdn-release@11.9.0/build/styles/atom-one-dark.min.css">
  <script src="https://cdn.jsdelivr.net/npm/markdown-it@13.0.2/dist/markdown-it.min.js" defer></script>
  <script src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.js" defer></script>
  <script src="https://cdn.jsdelivr.net/npm/@highlightjs/cdn-release@11.9.0/build/highlight.min.js" defer></script>
  <script src="https://cdn.jsdelivr.net/npm/dompurify@3.0.11/dist/purify.min.js" defer></script>

  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- 顶栏：标题 + 右侧 Back -->
  <header class="topbar">
    <a href="#/" class="brand">
      <span class="brand__name">WoBok's Vibe Daily</span>
    </a>
    <div class="topbar__right" id="topRight"></div>
  </header>

  <!-- 主容器：左侧目录 + 右侧内容 -->
  <main class="layout" id="layout">

    <!-- 左侧：目录树 -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar__inner">
        <div class="sidebar__header">
          <h2 class="sidebar__title">Index</h2>
        </div>
        <nav class="tree" id="tree" aria-label="文章目录">
          <div class="tree__loading">
            <span class="dot"></span><span class="dot"></span><span class="dot"></span>
          </div>
        </nav>
      </div>
    </aside>

    <!-- 右侧：内容区（Latest / 列表 / 文章） -->
    <section class="content" id="content"></section>

  </main>

  <!-- 文章页左右 Overlay：左侧大纲 + 右侧引用 -->
  <aside class="rail rail--left" id="outlineRail" aria-hidden="true">
    <div class="rail__inner" id="outlineInner"></div>
  </aside>
  <aside class="rail rail--right" id="refsRail" aria-hidden="true">
    <div class="rail__inner" id="refsInner"></div>
  </aside>

  <!-- 移动端大纲/引用按钮 -->
  <button class="rail-toggle rail-toggle--left" id="outlineToggle" aria-label="大纲">≡</button>
  <button class="rail-toggle rail-toggle--right" id="refsToggle" aria-label="引用">§</button>

  <script src="app.js" defer></script>
</body>
</html>
