<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WoBok's Vibe Daily</title>
  <meta name="description" content="WoBok 的个人笔记主页。">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300;9..144,400;9..144,500;9..144,600&family=Newsreader:opsz,wght@6..72,300;6..72,400;6..72,500&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css?v=20260707-list-scroll-3">
</head>
<body>
  <header class="topbar">
    <a href="#/" class="brand" id="brandLink" aria-label="WoBok's Vibe Daily">
      <span class="brand__name">WoBok's Vibe Daily</span>
    </a>
    <div class="topbar__right">
      <div class="topbar__actions">
        <button class="topbar__button topbar__button--mobile" id="indexBtn" type="button">Index</button>
        <button class="topbar__button" id="backBtn" type="button" hidden>Back</button>
      </div>
      <div
        class="topbar__tagline"
        data-hover-text="Simplicity is the ultimate sophistication."
      >Just trying to make notes simpler with AI.</div>
    </div>
  </header>

  <main class="layout" id="layout">
    <aside class="sidebar" id="sidebar">
      <div class="sidebar__inner">
        <div class="sidebar__header">
          <h2 class="sidebar__title">Index</h2>
        </div>
        <nav class="tree" id="tree" aria-label="文章目录">
          <div class="tree__loading">
            <span></span><span></span><span></span>
          </div>
        </nav>
      </div>
    </aside>

    <section class="content" id="content" tabindex="-1"></section>
  </main>

  <div class="mobile-rail-actions" id="mobileRailActions" hidden>
    <button type="button" data-rail="outline">Outline</button>
    <button type="button" data-rail="refs">Refs</button>
  </div>

  <script src="app.js?v=20260707-list-scroll-3"></script>
</body>
</html>
